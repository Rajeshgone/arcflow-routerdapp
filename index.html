<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Browser tab title -->

<title>ArcFlow</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>

<script src="https://unpkg.com/@walletconnect/ethereum-provider@2.11.0/dist/index.umd.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1220;
  color: #fff;
}
.container {
  max-width: 500px;
  margin: auto;
  padding: 16px;
}
h1 {
  text-align: center;
  margin-bottom: 10px;
}
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #2563eb;
  color: white;
  font-size: 15px;
}
input {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 8px;
  border: none;
}
.card {
  background: #121a2f;
  padding: 14px;
  border-radius: 10px;
  margin-top: 14px;
}
small {
  color: #9aa4c7;
  word-break: break-all;
}
</style>

</head>

<body>
<div class="container">

<!-- Visible app title -->

<h1>ArcFlow</h1>

<button onclick="connectInjected()">Connect Wallet</button> <button onclick="connectWC()">WalletConnect</button>

<div class="card">
  <div><b>Address</b><br><small id="addr">-</small></div>
  <div style="margin-top:8px;">
    <b>Balance (USDC native)</b><br>
    <span id="bal">-</span>
  </div>
</div>

<div class="card">
  <h3>Send</h3>
  <input id="to" placeholder="Recipient address">
  <input id="amount" placeholder="Amount (USDC)">
  <button onclick="sendTx()">Send Transaction</button>
</div>

<div class="card">
  <h3>History</h3>
  <div id="history"></div>
</div>

</div>

<script>

const ARC_CHAIN = {
  chainId: "0x66eee",
  chainName: "Arc Testnet",
  rpcUrls: ["https://rpc.arc.xyz"],
  nativeCurrency: {
    name: "USDC",
    symbol: "USDC",
    decimals: 6
  }
};

const WC_PROJECT_ID = "YOUR_PROJECT_ID";

let provider, signer, address;

async function connectInjected() {
  if (!window.ethereum) return alert("No wallet found");

  provider = new ethers.BrowserProvider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  signer = await provider.getSigner();
  address = await signer.getAddress();

  await switchNetwork();
  initEvents();
  updateUI();
}

async function connectWC() {
  const wc = await window.EthereumProvider.init({
    projectId: WC_PROJECT_ID,
    chains: [421614],
    showQrModal: true
  });

  await wc.connect();

  provider = new ethers.BrowserProvider(wc);
  signer = await provider.getSigner();
  address = await signer.getAddress();

  initEvents();
  updateUI();
}

async function switchNetwork() {
  try {
    await window.ethereum.request({
      method: "wallet_switchEthereumChain",
      params: [{ chainId: ARC_CHAIN.chainId }]
    });
  } catch {
    await window.ethereum.request({
      method: "wallet_addEthereumChain",
      params: [ARC_CHAIN]
    });
  }
}

async function updateUI() {
  document.getElementById("addr").innerText = address || "-";

  if (!provider || !address) return;

  const bal = await provider.getBalance(address);
  const formatted = Number(ethers.formatUnits(bal, 6)).toFixed(4);

  document.getElementById("bal").innerText = formatted;

  renderHistory();
}

async function sendTx() {
  const to = document.getElementById("to").value.trim();
  const amount = document.getElementById("amount").value.trim();

  if (!to || !amount) return alert("Fill all fields");

  try {
    const tx = await signer.sendTransaction({
      to,
      value: ethers.parseUnits(amount, 6)
    });

    saveTx({
      hash: tx.hash,
      to,
      amount,
      time: Date.now()
    });

    alert("Tx sent:\n" + tx.hash);
    updateUI();

  } catch (e) {
    console.error(e);
    alert("Transaction failed");
  }
}

function saveTx(tx) {
  const list = JSON.parse(localStorage.getItem("arc_history") || "[]");
  list.unshift(tx);
  localStorage.setItem("arc_history", JSON.stringify(list));
}

function renderHistory() {
  const el = document.getElementById("history");
  const list = JSON.parse(localStorage.getItem("arc_history") || "[]");

  if (!list.length) {
    el.innerHTML = "<small>No transactions yet</small>";
    return;
  }

  el.innerHTML = list.map(tx => `
    <div style="margin-bottom:10px;">
      <small>${new Date(tx.time).toLocaleString()}</small><br>
      ${tx.amount} → ${tx.to}<br>
      <small>${tx.hash}</small>
    </div>
  `).join("");
}

function initEvents() {
  if (window.ethereum) {
    window.ethereum.on("accountsChanged", () => location.reload());
    window.ethereum.on("chainChanged", () => location.reload());
  }
}

renderHistory();

</script>

</body>
</html>
