<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArcFlow</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>
<script src="https://unpkg.com/@walletconnect/ethereum-provider@2.11.0/dist/index.umd.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1220;
  color: #fff;
}
.container {
  max-width: 500px;
  margin: auto;
  padding: 16px;
}
h1 {
  text-align: center;
}
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #2563eb;
  color: white;
  font-size: 15px;
}
input {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 8px;
  border: none;
}
.card {
  background: #121a2f;
  padding: 14px;
  border-radius: 10px;
  margin-top: 14px;
}
small {
  color: #9aa4c7;
  word-break: break-all;
}
a { color:#60a5fa; text-decoration:none; }
</style>

</head>

<body>
<div class="container">

<h1>ArcFlow</h1>

<button onclick="connectInjected()">Connect Wallet</button>
<button onclick="connectWC()">WalletConnect</button>
<button onclick="window.open('https://faucet.circle.com')">Get Test USDC</button>

<div class="card">
  <b>Address</b><br>
  <small id="addr">-</small>

  <div style="margin-top:10px;">
    <b>Balance (USDC)</b><br>
    <span id="bal">-</span>
  </div>
</div>

<div class="card">
  <h3>Send</h3>
  <input id="to" placeholder="Recipient address">
  <input id="amount" placeholder="Amount (USDC)">
  <button onclick="sendTx()">Send Transaction</button>
</div>

<div class="card">
  <h3>History</h3>
  <div id="history"></div>
</div>

</div>

<script>

const DECIMALS = 18;
const EXPLORER = "https://testnet.arcscan.app/tx/";

const ARC_CHAIN = {
  chainId: "0x4CE3F2",
  chainName: "Arc Testnet",
  rpcUrls: [
    "https://rpc.testnet.arc.network",
    "https://rpc.blockdaemon.testnet.arc.network",
    "https://rpc.drpc.testnet.arc.network",
    "https://rpc.quicknode.testnet.arc.network"
  ],
  nativeCurrency: {
    name: "USDC",
    symbol: "USDC",
    decimals: 18
  },
  blockExplorerUrls: ["https://testnet.arcscan.app"]
};

const WC_PROJECT_ID = "REPLACE_WITH_YOUR_PROJECT_ID";

let provider, signer, address;

/* ---------- CONNECT INJECTED ---------- */
async function connectInjected() {
  if (!window.ethereum) return alert("No wallet found");

  provider = new ethers.BrowserProvider(window.ethereum);

  await provider.send("eth_requestAccounts", []);
  signer = await provider.getSigner();
  address = await signer.getAddress();

  await ensureNetwork();
  initEvents();
  updateUI();
}

/* ---------- WALLETCONNECT ---------- */
async function connectWC() {
  const wc = await window.EthereumProvider.init({
    projectId: WC_PROJECT_ID,
    chains: [5042002],
    showQrModal: true
  });

  await wc.connect();

  provider = new ethers.BrowserProvider(wc);
  signer = await provider.getSigner();
  address = await signer.getAddress();

  try {
    await wc.request({
      method: "wallet_switchEthereumChain",
      params: [{ chainId: ARC_CHAIN.chainId }]
    });
  } catch {}

  initEvents();
  updateUI();
}

/* ---------- NETWORK ---------- */
async function ensureNetwork() {
  const net = await provider.getNetwork();

  if (Number(net.chainId) !== 5042002) {
    try {
      await window.ethereum.request({
        method: "wallet_switchEthereumChain",
        params: [{ chainId: ARC_CHAIN.chainId }]
      });
    } catch {
      await window.ethereum.request({
        method: "wallet_addEthereumChain",
        params: [ARC_CHAIN]
      });
    }
  }
}

/* ---------- UI ---------- */
async function updateUI() {
  document.getElementById("addr").innerText = address || "-";

  if (!provider || !address) return;

  const bal = await provider.getBalance(address);
  const formatted = Number(ethers.formatUnits(bal, DECIMALS)).toFixed(4);

  document.getElementById("bal").innerText = formatted;

  renderHistory();
}

/* ---------- SEND TX ---------- */
async function sendTx() {
  const to = document.getElementById("to").value.trim();
  const amount = document.getElementById("amount").value.trim();

  if (!to || !amount) return alert("Fill all fields");
  if (!ethers.isAddress(to)) return alert("Invalid address");

  try {
    const tx = await signer.sendTransaction({
      to,
      value: ethers.parseUnits(amount, DECIMALS)
    });

    alert("Tx sent:\n" + tx.hash);

    await tx.wait();

    saveTx({
      hash: tx.hash,
      to,
      amount,
      time: Date.now()
    });

    updateUI();

  } catch (e) {
    console.error(e);
    alert(e.reason || e.message || "Transaction failed");
  }
}

/* ---------- HISTORY ---------- */
function saveTx(tx) {
  const list = JSON.parse(localStorage.getItem("arc_history") || "[]");
  list.unshift(tx);
  localStorage.setItem("arc_history", JSON.stringify(list));
}

function renderHistory() {
  const el = document.getElementById("history");
  const list = JSON.parse(localStorage.getItem("arc_history") || "[]");

  if (!list.length) {
    el.innerHTML = "<small>No transactions yet</small>";
    return;
  }

  el.innerHTML = list.map(tx => `
    <div style="margin-bottom:10px;">
      <small>${new Date(tx.time).toLocaleString()}</small><br>
      ${tx.amount} → ${tx.to}<br>
      <a href="${EXPLORER}${tx.hash}" target="_blank">
        <small>${tx.hash}</small>
      </a>
    </div>
  `).join("");
}

/* ---------- EVENTS ---------- */
function initEvents() {
  if (window.ethereum) {
    window.ethereum.on("accountsChanged", () => location.reload());
    window.ethereum.on("chainChanged", () => location.reload());
  }
}

renderHistory();

</script>

</body>
</html>
